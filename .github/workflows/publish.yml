name: Publish to npm

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm test

  publish:
    needs: build-and-test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write          # npm provenance (links package to this repo)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build

      - name: Publish (skip if version already exists)
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          REMOTE_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || echo "0.0.0")

          if [ "$LOCAL_VERSION" = "$REMOTE_VERSION" ]; then
            echo "::notice::v${LOCAL_VERSION} already published — skipping."
          else
            echo "Publishing ${PACKAGE_NAME}@${LOCAL_VERSION}..."
            npm publish --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
